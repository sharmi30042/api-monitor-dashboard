spring.application.name=api-monitor-tool

# 1. Cloud Database Connection (Updated for Azure)
# Replace 'YOUR-SERVER-NAME' with the Server Name from the Azure Overview page
spring.datasource.url=jdbc:mysql://apimonitor-server-final.mysql.database.azure.com:3306/api_monitor_db?useSSL=true&requireSSL=false

# 2. Azure Credentials
# Replace 'apimonitor' with your Azure Admin Username if it's different
spring.datasource.username=apimonitor
# Replace with the password you created during the Azure deployment
spring.datasource.password=sharmi@21cloud

# 3. Hibernate Settings (Keep these as they are)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 4. Server Port
server.port=8080